# lefthook git hooks for commit0-analyzer — https://lefthook.dev
#
# Setup (run once after cloning):
#   brew install lefthook        # or: go install github.com/evilmartians/lefthook@latest
#   lefthook install             # or: make hooks
#
# Requirements:
#   - golangci-lint v2 (matches CI). Install: brew install golangci-lint
#
# Bypass in an emergency: git commit --no-verify  /  git push --no-verify

# Auto-append the DCO Signed-off-by trailer so every commit is signed
# without having to remember `git commit -s`. Idempotent: adds nothing
# when the trailer is already present.
prepare-commit-msg:
  commands:
    sign-off:
      run: |
        name="$(git config user.name)"
        email="$(git config user.email)"
        git interpret-trailers --if-exists doNothing \
          --trailer "Signed-off-by: $name <$email>" --in-place "{1}"

# Enforce Conventional Commits on the commit message subject line,
# and require the DCO Signed-off-by trailer (normally auto-added above).
commit-msg:
  commands:
    sign-off:
      run: |
        if grep -q '^Signed-off-by: ' "{1}"; then exit 0; fi
        echo "✗ Commit must carry a Signed-off-by trailer (DCO)."
        echo "  Use: git commit -s  (or reinstall hooks: make hooks)"
        exit 1
    conventional:
      # {1} is the path to the commit message file passed by git.
      run: |
        subject="$(head -n1 "{1}")"
        if printf '%s' "$subject" | grep -qE '^(Merge |Revert |fixup!|squash!|(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z0-9 ._/-]+\))?!?: .+)'; then
          exit 0
        fi
        echo "✗ Commit message must follow Conventional Commits:"
        echo "      <type>(<scope>): <description>"
        echo "  types: build chore ci docs feat fix perf refactor revert style test"
        echo "  e.g.:  fix(host): exempt sticky world-writable dirs"
        echo "  got:   $subject"
        exit 1

# Catch lint/compile errors before they reach CI.
pre-push:
  parallel: true
  commands:
    lint:
      run: golangci-lint run --timeout=5m
    build:
      run: go build ./...
