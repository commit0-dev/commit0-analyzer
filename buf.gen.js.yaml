version: v2

# Generates TypeScript stubs from proto/commit0/v1/plugin.proto into the JS plugin.
# Run: buf generate --template buf.gen.js.yaml
# Requires ts-proto installed in plugins/js-reachability (npm install).

plugins:
  - local: plugins/js-reachability/node_modules/.bin/protoc-gen-ts_proto
    out: plugins/js-reachability/src/gen
    opt:
      - outputServices=grpc-js
      - esModuleInterop=true
      - env=node
      - useOptionals=messages
      - exportCommonSymbols=false
      - oneof=unions
